<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootswatch Minty Theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/minty/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Community Pollution Forum</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-tree-fill me-2"></i>Pollution Forum</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link fs-6 fw-bold mx-2" href="/map"><i class="bi bi-map me-1"></i> Tracker Map</a></li>
                    <li class="nav-item"><a class="nav-link fs-6 fw-bold mx-2" href="/hazards"><i class="bi bi-lungs-fill me-1"></i> Hazards Info</a></li>
                    <li class="nav-item"><a class="nav-link fs-6 fw-bold mx-2" href="/forum"><i class="bi bi-chat-square-text me-1"></i> Forum</a></li>
                    <li class="nav-item"><a class="nav-link fs-6 fw-bold mx-2" href="/events"><i class="bi bi-calendar-event me-1"></i> Events</a></li>
                    <li class="nav-item"><a class="nav-link fs-6 fw-bold mx-2" href="/contact"><i class="bi bi-envelope-paper me-1"></i> Contact Gov</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container mb-5 pb-5">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-info shadow-sm rounded-pill mb-4">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; <script>document.write(new Date().getFullYear())</script> Community Pollution Forum. Empowering local neighborhoods.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
